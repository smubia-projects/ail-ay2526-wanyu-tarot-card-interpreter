<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarot Card Interpreter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
  font-family: Georgia, serif;
  background: radial-gradient(circle at top, #1a1a1a 0%, #090909 45%, #000000 100%);
  color: #f4e8c1;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
}

    .screen {
      min-height: 100vh;
      width: 100%;
      display: none;
      padding: 32px 20px;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 1250px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      font-size: 2.8rem;
      letter-spacing: 2px;
      margin-bottom: 10px;
      color: #f6d98f;
      text-shadow: 0 0 12px rgba(246, 217, 143, 0.25);
    }

    .subtitle {
      color: #cbb98c;
      margin-bottom: 12px;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .instruction {
      color: #ead9a6;
      margin-bottom: 24px;
      font-size: 1rem;
    }

    .question-box {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    input {
      width: min(760px, 92%);
      padding: 15px 18px;
      border-radius: 14px;
      border: 1px solid rgba(246, 217, 143, 0.18);
      background: rgba(255, 255, 255, 0.05);
      color: #f8f0d5;
      font-size: 1rem;
      outline: none;
      box-shadow: inset 0 0 8px rgba(255,255,255,0.03);
    }

    input::placeholder {
      color: #a59570;
    }

    .selection-status {
      margin-bottom: 20px;
      color: #f3e5bc;
      font-size: 1rem;
      min-height: 24px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(95px, 1fr));
      gap: 18px;
      margin: 0 auto;
      max-width: 1100px;
    }

    .card {
      aspect-ratio: 2 / 3.2;
      border-radius: 14px;
      position: relative;
      background: linear-gradient(145deg, #0f0f12, #1d1b2e);
      border: 1px solid rgba(255, 223, 140, 0.15);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, opacity 0.25s ease;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.45);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.06), transparent 30%),
        radial-gradient(circle at 70% 80%, rgba(130,90,255,0.12), transparent 35%),
        linear-gradient(135deg, rgba(255,215,120,0.08), transparent 60%);
      pointer-events: none;
    }

    .card::after {
      content: "✦";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: rgba(245, 220, 150, 0.75);
      text-shadow: 0 0 12px rgba(245, 220, 150, 0.35);
    }

    .card:hover {
      transform: translateY(-10px);
      border-color: rgba(255, 223, 140, 0.45);
      box-shadow:
        0 16px 30px rgba(0, 0, 0, 0.5),
        0 0 16px rgba(160, 110, 255, 0.28),
        0 0 24px rgba(255, 220, 140, 0.18);
    }

    .card.selected {
      transform: translateY(-12px);
      border-color: rgba(255, 223, 140, 0.85);
      box-shadow:
        0 18px 34px rgba(0, 0, 0, 0.6),
        0 0 18px rgba(255, 223, 140, 0.45),
        0 0 28px rgba(130, 90, 255, 0.25);
    }

    .card.selected:hover {
      transform: translateY(-12px);
    }

    .card.locked {
      opacity: 0.55;
      cursor: default;
    }

    .card.locked:hover {
      transform: none;
      border-color: rgba(255, 223, 140, 0.15);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.45);
    }

    .card-label {
      position: absolute;
      bottom: 8px;
      left: 0;
      right: 0;
      font-size: 0.72rem;
      color: rgba(240, 230, 200, 0.72);
      letter-spacing: 1px;
      text-align: center;
    }

    .center-panel {
      max-width: 850px;
      width: min(850px, 92%);
      margin: 0 auto;
      padding: 34px 28px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(246, 217, 143, 0.16);
      box-shadow:
        0 0 32px rgba(0, 0, 0, 0.38),
        0 0 18px rgba(115, 86, 255, 0.12);
      text-align: center;
    }

    .thinking-text {
      font-size: 1.45rem;
      color: #f0dfb0;
      letter-spacing: 1px;
      text-shadow: 0 0 14px rgba(240, 223, 176, 0.18);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .dots::after {
      content: "";
      animation: dots 1.5s steps(4, end) infinite;
    }

    .reading-title {
      font-size: 2rem;
      color: #f6d98f;
      margin-bottom: 20px;
      text-shadow: 0 0 12px rgba(246, 217, 143, 0.2);
    }

    .reading-text {
      color: #f6edd3;
      line-height: 1.8;
      white-space: pre-wrap;
      text-align: left;
      font-size: 1rem;
    }

    .restart-btn {
      margin-top: 24px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6d4aff, #3e1f7a);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(109, 74, 255, 0.25);
    }

    .restart-btn:hover {
      transform: translateY(-2px);
    }

    .error-text {
      margin-top: 14px;
      color: #ffcfb3;
      min-height: 24px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.75; }
      50% { opacity: 1; }
    }

    @keyframes dots {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75% { content: "..."; }
      100% { content: ""; }
    }

    .rl-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .rl-modal.active {
      display: flex;
    }

    .rl-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      animation: rlFadeIn 0.5s ease;
    }

    .rl-card {
      position: relative;
      width: min(420px, 92%);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      animation: rlSlideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .rl-banner {
      position: relative;
      padding: 32px 24px 24px;
      text-align: center;
      overflow: hidden;
    }

    .rl-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.15;
    }

    .rl-circle-1 {
      width: 180px;
      height: 180px;
      background: white;
      top: -40px;
      right: -30px;
    }

    .rl-circle-2 {
      width: 120px;
      height: 120px;
      background: white;
      bottom: -20px;
      left: -20px;
    }

    .rl-emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 12px;
    }

    .rl-headline {
      font-size: 1.4rem;
      color: #fff;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .rl-description {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.5;
    }

    .rl-body {
      background: #1a1a2e;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .rl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 14px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .rl-btn:hover {
      transform: translateY(-2px);
    }

    .rl-btn-primary {
      background: linear-gradient(135deg, #6d4aff, #3e1f7a);
      color: #fff;
      box-shadow: 0 4px 16px rgba(109, 74, 255, 0.35);
    }

    .rl-btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #e0d8f0;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .rl-arrow {
      position: absolute;
      right: 18px;
      font-size: 1.1rem;
    }

    .rl-dismiss {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.9rem;
      cursor: pointer;
      padding: 8px;
      margin-top: 4px;
      text-align: center;
    }

    .rl-dismiss:hover {
      color: rgba(255, 255, 255, 0.7);
    }

    @keyframes rlFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes rlSlideUp {
      from { transform: scale(0.95) translateY(20px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 2.1rem;
      }

      .card-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .thinking-text {
        font-size: 1.2rem;
      }

      .reading-title {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <!-- Selection screen -->
  <section class="screen active" id="selectionScreen">
    <div class="container">
      <h1>Tarot Card Interpreter</h1>
      <p class="subtitle">Whispers from the unknown await your question.</p>
      <p class="instruction">Choose 3 cards, one by one.</p>

      <div class="question-box">
        <input id="question" type="text" placeholder="Ask your tarot question..." />
      </div>

      <div class="selection-status" id="selectionStatus">Selected: 0 / 3</div>
      <div class="error-text" id="errorText"></div>

      <div class="card-grid" id="cardGrid"></div>
    </div>
  </section>

  <!-- Thinking screen -->
  <section class="screen" id="thinkingScreen">
    <div class="center-panel">
      <div class="thinking-text">
        Tarot spirits are thinking<span class="dots"></span>
      </div>
    </div>
  </section>

  <!-- Reading screen -->
  <section class="screen" id="readingScreen">
    <div class="center-panel">
      <div class="reading-title">Your Reading</div>
      <div class="reading-text" id="readingText"></div>
      <button class="restart-btn" onclick="restartReading()">Draw Again</button>
    </div>
  </section>

  <!-- Rate Limit CTA Modal -->
  <div id="rateLimitModal" class="rl-modal" role="dialog" aria-modal="true">
    <div id="rateLimitBackdrop" class="rl-backdrop"></div>
    <div class="rl-card">
      <div id="rlModalBanner" class="rl-banner">
        <div class="rl-circle rl-circle-1"></div>
        <div class="rl-circle rl-circle-2"></div>
        <span id="rlModalEmoji" class="rl-emoji"></span>
        <h2 id="rlModalHeadline" class="rl-headline"></h2>
        <p id="rlModalDescription" class="rl-description"></p>
      </div>
      <div class="rl-body">
        <a id="rlModalJoinBtn" class="rl-btn rl-btn-primary" href="#" target="_blank" rel="noopener">Join AI Lodge<span class="rl-arrow">&rarr;</span></a>
        <a id="rlModalGithubBtn" class="rl-btn rl-btn-secondary" href="#" target="_blank" rel="noopener">Self-host from GitHub<span class="rl-arrow">&rarr;</span></a>
        <a id="rlModalShowcaseBtn" class="rl-btn rl-btn-secondary" href="#" target="_blank" rel="noopener">Explore other projects<span class="rl-arrow">&rarr;</span></a>
        <button class="rl-dismiss" onclick="dismissRateLimitModal()">Maybe later</button>
      </div>
    </div>
  </div>

  <script src="./config.js"></script>
  <script>
    const API_BASE = window.VITE_API_BASE || 'http://localhost:8080';
    const totalCards = 22;
    const maxSelected = 3;

    const selectionScreen = document.getElementById("selectionScreen");
    const thinkingScreen = document.getElementById("thinkingScreen");
    const readingScreen = document.getElementById("readingScreen");

    const cardGrid = document.getElementById("cardGrid");
    const selectionStatus = document.getElementById("selectionStatus");
    const errorText = document.getElementById("errorText");
    const readingText = document.getElementById("readingText");
    const questionInput = document.getElementById("question");

    let selectedCards = [];
    let isTransitioning = false;

    function showScreen(screen) {
      [selectionScreen, thinkingScreen, readingScreen].forEach(s => {
        s.classList.remove("active");
      });
      screen.classList.add("active");
    }

    function updateSelectionUI() {
      selectionStatus.textContent = `Selected: ${selectedCards.length} / 3`;

      const allCards = document.querySelectorAll(".card");
      allCards.forEach(card => {
        const cardNumber = Number(card.dataset.cardNumber);
        const isSelected = selectedCards.includes(cardNumber);

        card.classList.toggle("selected", isSelected);

        if (!isSelected && selectedCards.length >= maxSelected) {
          card.classList.add("locked");
        } else {
          card.classList.remove("locked");
        }
      });
    }

    function buildCards() {
      cardGrid.innerHTML = "";

      for (let i = 1; i <= totalCards; i++) {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.cardNumber = i;
        card.innerHTML = `<div class="card-label">Arcana ${i}</div>`;

        card.addEventListener("click", async () => {
          if (isTransitioning) return;

          const cardNumber = Number(card.dataset.cardNumber);
          const alreadySelected = selectedCards.includes(cardNumber);

          errorText.textContent = "";

          if (alreadySelected) {
            selectedCards = selectedCards.filter(num => num !== cardNumber);
            updateSelectionUI();
            return;
          }

          if (selectedCards.length >= maxSelected) return;

          selectedCards.push(cardNumber);
          updateSelectionUI();

          if (selectedCards.length === 3) {
            const question = questionInput.value.trim();

            if (!question) {
              errorText.textContent = "Ask your tarot question before choosing the final card.";
              selectedCards.pop();
              updateSelectionUI();
              return;
            }

            isTransitioning = true;
            await beginReading(question, selectedCards);
          }
        });

        cardGrid.appendChild(card);
      }
    }

    async function beginReading(question, chosenCards) {
      showScreen(thinkingScreen);

      try {
        const res = await fetch(`${API_BASE}/api/reading`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            question,
            selectedCards: chosenCards
          })
        });

        if (res.status === 429) {
          let queriesUsed = 5;
          try {
            const errData = await res.json();
            queriesUsed = errData.queries_used || 5;
          } catch (_) {}
          showRateLimitModal(queriesUsed);
          showScreen(selectionScreen);
          return;
        }

        // 503 = demo paused via the central kill switch. Distinct from the 429
        // CTA: a paused demo is an operator action, not the user hitting a limit.
        if (res.status === 503) {
          let msg = "This demo is temporarily paused. Please check back soon.";
          try {
            const errData = await res.json();
            if (errData && errData.message) msg = errData.message;
          } catch (_) {}
          await new Promise(resolve => setTimeout(resolve, 1200));
          readingText.textContent = "⏸️ " + msg;
          showScreen(readingScreen);
          return;
        }

        const data = await res.json();

        await new Promise(resolve => setTimeout(resolve, 1500));

        readingText.textContent =
          data.answer ||
          data.error ||
          "The spirits are quiet right now.";

        showScreen(readingScreen);
      } catch (error) {
        await new Promise(resolve => setTimeout(resolve, 1500));
        readingText.textContent = "Something went wrong while summoning the reading.";
        showScreen(readingScreen);
      } finally {
        isTransitioning = false;
      }
    }

    function restartReading() {
      selectedCards = [];
      errorText.textContent = "";
      readingText.textContent = "";
      questionInput.value = "";
      updateSelectionUI();
      showScreen(selectionScreen);
    }

    const CTA_CONFIG = {
      name: "Tarot Card Interpreter",
      emoji: "\u{1F52E}",
      accentColor: "#6d4aff",
      headline: "The spirits have spoken enough!",
      description: "This demo interpreted {count} tarot readings for you. Want to explore more mystical AI projects?",
      programme: "AI Lodge",
      programmeLink: "https://www.smubia.com/ai-lodge",
      githubLink: "https://github.com/smubia-projects/ail-ay2526-s2-wanyu-tarot-card-interpreter",
      showcaseLink: "https://www.smubia.com/showcase"
    };

    function showRateLimitModal(queriesUsed) {
      const desc = CTA_CONFIG.description.replace("{count}", queriesUsed);
      document.getElementById("rlModalEmoji").textContent = CTA_CONFIG.emoji;
      document.getElementById("rlModalHeadline").textContent = CTA_CONFIG.headline;
      document.getElementById("rlModalDescription").textContent = desc;
      document.getElementById("rlModalJoinBtn").href = CTA_CONFIG.programmeLink;
      document.getElementById("rlModalJoinBtn").textContent = `Join ${CTA_CONFIG.programme}`;
      document.getElementById("rlModalGithubBtn").href = CTA_CONFIG.githubLink;
      document.getElementById("rlModalShowcaseBtn").href = CTA_CONFIG.showcaseLink;

      const banner = document.getElementById("rlModalBanner");
      banner.style.background = `linear-gradient(135deg, ${CTA_CONFIG.accentColor}, ${CTA_CONFIG.accentColor}99)`;

      const modal = document.getElementById("rateLimitModal");
      modal.classList.add("active");
    }

    function dismissRateLimitModal() {
      document.getElementById("rateLimitModal").classList.remove("active");
    }

    document.getElementById("rateLimitBackdrop").addEventListener("click", dismissRateLimitModal);

    buildCards();
    updateSelectionUI();
  </script>
</body>
</html>
